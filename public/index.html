<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI判定ゲーム MVP</title>
    <link rel="icon" type="image/png" href="/icon_only.png" />
    <link rel="apple-touch-icon" href="/icon_only.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand-mark" type="button" data-action="go-home" aria-label="ホームへ戻る" title="ホームへ戻る">
          <img src="/icon_only.png" alt="" aria-hidden="true" />
        </button>
        <div>
          <p class="eyebrow">CHAT DEDUCTION</p>
          <h1><img class="brand-name-image" src="/icon_name.png" alt="AI判定ゲーム" /></h1>
        </div>
        <div class="session-pill" id="sessionPill">接続中</div>
      </header>

      <main id="app" class="view" aria-live="polite"></main>
      <div id="toast" class="toast" role="status"></div>
    </div>

    <template id="rulesTemplate">
      <section class="rules-panel">
        <h2>ルール</h2>
        <p>1:1で相手がAIか人間かを判定するゲームです。</p>
        <p>AIのふりをする側は、相手にAIだと思わせたら勝ちです。</p>
        <p>AIを見破る側は、相手がAIか人間かを正しく判定したら勝ちです。</p>
        <p>ラウンド1はお題に沿った3往復チャット、ラウンド2は正体判定です。</p>
        <p>各発言は30文字以内です。危険な質問、個人情報要求、プロンプト攻撃、荒らし発言はルール外です。</p>
      </section>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
